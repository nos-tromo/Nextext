name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Pinned to the moving v2 alias (strict-config + make/common.mk + frontend eslint.config.js
    # drift-checks; nos-tromo style tuning: line-length=120, ANN401 ignored,
    # local mypy hook). Canonical configs at
    # nos-tromo/.github/configs/{python-strict,make-common,frontend-eslint}/.
    uses: nos-tromo/.github/.github/workflows/python-app-ci.yml@v2
    with:
      python-versions: '["3.12"]'
      uv-sync-args: '--frozen --group dev'
      docker-build: true
