
# Proxy target URI: strip the /nextext prefix from the RAW request URI so
# percent-encoding survives ($uri would arrive decoded and un-re-encoded;
# $request_uri would keep the prefix the backend doesn't know).
# $request_uri includes the query string, so no $is_args$args needed.
map $request_uri $proxy_uri {
    ~^/nextext(?<rest>/.+)$ $rest;
    default $request_uri;
}

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;
    root /usr/share/nginx/html;

    set $backend_upstream "backend:8000";

    # Canonical sub-path: strip the /nextext prefix so the existing
    # root-anchored locations below apply unchanged. (/.+ not /.*: the
    # bare prefix must fall through to the SPA fallback, not rewrite to
    # "/" and loop through the redirect below.)
    rewrite ^/nextext(/.+)$ $1;

    location = / {
        return 302 /nextext/;
    }

    # SSE: job event stream — no buffering, long read timeout.
    location ~ ^/api/v1/jobs/[^/]+/events$ {
        include /etc/nginx/security-headers.conf;
        proxy_pass http://$backend_upstream$proxy_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        gzip off;
    }

    # Job creation: large multipart upload streamed through to the backend.
    location = /api/v1/jobs {
        include /etc/nginx/security-headers.conf;
        proxy_pass http://$backend_upstream$proxy_uri;
        proxy_set_header Host $host;
        client_max_body_size ${NEXTEXT_CLIENT_MAX_BODY_SIZE};
        proxy_request_buffering off;
        proxy_read_timeout 1h;
    }

    # Artifact downloads (per-job `…/artifacts/<name>` + batch `batch/<name>`).
    # The backend assembles CSV/XLSX/ZIP bundles on demand from in-memory job
    # state; a multi-file batch ZIP can take well over the default 60s to build
    # and emits no bytes until done, so give downloads the same long read budget
    # as the upload/SSE paths instead of letting them fall through to `/api/`.
    location ~ ^/api/v1/jobs/(?:[^/]+/artifacts|batch)/[^/]+$ {
        include /etc/nginx/security-headers.conf;
        proxy_pass http://$backend_upstream$proxy_uri;
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
    }

    # All other API calls.
    location /api/ {
        include /etc/nginx/security-headers.conf;
        proxy_pass http://$backend_upstream$proxy_uri;
        proxy_set_header Host $host;
    }

    # Hashed, immutable build assets.
    location /assets/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback for client-side routing.
    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }
}
