server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;
    root /usr/share/nginx/html;

    set $backend_upstream "backend:8000";

    # SSE: job event stream — no buffering, long read timeout.
    location ~ ^/api/v1/jobs/[^/]+/events$ {
        include /etc/nginx/security-headers.conf;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        gzip off;
    }

    # Job creation: large multipart upload streamed through to the backend.
    location = /api/v1/jobs {
        include /etc/nginx/security-headers.conf;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        client_max_body_size ${NEXTEXT_CLIENT_MAX_BODY_SIZE};
        proxy_request_buffering off;
        proxy_read_timeout 1h;
    }

    # All other API calls.
    location /api/ {
        include /etc/nginx/security-headers.conf;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
    }

    # Hashed, immutable build assets.
    location /assets/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback for client-side routing.
    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }
}
