name: nextext

x-no-proxy-env: &no-proxy-env
  NO_PROXY: "backend,frontend,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"
  no_proxy: "backend,frontend,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"

x-env-file: &env-file
  - ../.env

##########################################################
# Shared logging — the local driver rotates and compresses
# per-container; tail with `docker compose logs -f <svc>`.
##########################################################
x-logging: &default-logging
  driver: "local"
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

services:
  ##########################################################
  # Nextext backend — FastAPI + pipeline + CLI. CPU-only:
  # all model inference runs on external endpoints.
  ##########################################################
  backend:
    image: nextext-backend:${NEXTEXT_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    logging: *default-logging
    environment:
      <<: *no-proxy-env
      DIARIZE_API_BASE: ${DIARIZE_API_BASE:-}
      DIARIZE_TIMEOUT: ${DIARIZE_TIMEOUT:-}
      INFERENCE_PROVIDER: ${INFERENCE_PROVIDER:-ollama}
      NER_API_BASE: ${NER_API_BASE:-}
      NER_TIMEOUT: ${NER_TIMEOUT:-}
      NEXTEXT_API_HOST: ${NEXTEXT_API_HOST:-0.0.0.0}
      NEXTEXT_API_PORT: ${NEXTEXT_API_PORT:-8000}
      NEXTEXT_AUTH_HEADER: ${NEXTEXT_AUTH_HEADER:-X-Auth-User}
      NEXTEXT_DEFAULT_IDENTITY: ${NEXTEXT_DEFAULT_IDENTITY:-}
      NEXTEXT_MAX_UPLOAD_MB: ${NEXTEXT_MAX_UPLOAD_MB:-8192}
      NEXTEXT_OFFLINE: ${NEXTEXT_OFFLINE:-1}
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PRELOAD_MODELS: ${PRELOAD_MODELS:-false}
      TEXT_MODEL: ${TEXT_MODEL:-}
      VAD_API_BASE: ${VAD_API_BASE:-}
      VAD_TIMEOUT: ${VAD_TIMEOUT:-}
      WHISPER_API_BASE: ${WHISPER_API_BASE:-}
      WHISPER_API_KEY: ${WHISPER_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-}
    env_file: *env-file
    volumes:
      - nltk-cache:/root/nltk_data
      - spacy-cache:/root/.cache/spacy
    networks:
      nextext-net:
        aliases:
          - backend
      inference-net:
        aliases:
          - nextext-backend

  ##########################################################
  # Nextext frontend — React SPA (nginx). Same-origin proxy
  # to the backend; browser uploads stream through nginx
  # without buffering whole files in any Python process.
  ##########################################################
  frontend:
    image: nextext-frontend:${NEXTEXT_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    logging: *default-logging
    environment:
      <<: *no-proxy-env
      NEXTEXT_CLIENT_MAX_BODY_SIZE: ${NEXTEXT_CLIENT_MAX_BODY_SIZE:-8192m}
    env_file: *env-file
    networks:
      nextext-net:
    depends_on:
      - backend

##########################################################
# Volumes — spaCy/NLTK language-resource caches only;
# model inference happens on external endpoints.
##########################################################
volumes:
  nltk-cache:
    external: true
  spacy-cache:
    external: true

##########################################################
# Networks
##########################################################
networks:
  nextext-net:
  inference-net:
    external: true
    name: ${INFERENCE_NETWORK:-inference-net}
