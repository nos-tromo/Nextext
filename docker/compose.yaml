name: nextext

x-no-proxy-env: &no-proxy-env
  NO_PROXY: "backend,frontend,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"
  no_proxy: "backend,frontend,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"

x-env-file: &env-file
  - ../.env

##########################################################
# Shared logging — the local driver rotates and compresses
# per-container; tail with `docker compose logs -f <svc>`.
##########################################################
x-logging: &default-logging
  driver: "local"
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

services:
  ##########################################################
  # Nextext backend (CPU) — FastAPI + pipeline + CLI
  ##########################################################
  backend-cpu:
    image: nextext-backend-cpu:${NEXTEXT_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.cpu
    logging: *default-logging
    environment: &backend-env
      <<: *no-proxy-env
      DIARIZE_API_BASE: ${DIARIZE_API_BASE:-}
      DIARIZE_TIMEOUT: ${DIARIZE_TIMEOUT:-600}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-false}
      INFERENCE_PROVIDER: ${INFERENCE_PROVIDER:-ollama}
      NER_API_BASE: ${NER_API_BASE:-}
      NER_TIMEOUT: ${NER_TIMEOUT:-120}
      NEXTEXT_API_HOST: ${NEXTEXT_API_HOST:-0.0.0.0}
      NEXTEXT_API_PORT: ${NEXTEXT_API_PORT:-8000}
      NEXTEXT_DATA_DIR: ${NEXTEXT_DATA_DIR:-/var/lib/nextext}
      NEXTEXT_JOB_TTL_SECONDS: ${NEXTEXT_JOB_TTL_SECONDS:-3600}
      NEXTEXT_MAX_UPLOAD_MB: ${NEXTEXT_MAX_UPLOAD_MB:-8192}
      NEXTEXT_OFFLINE: ${NEXTEXT_OFFLINE:-1}
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PRELOAD_MODELS: ${PRELOAD_MODELS:-false}
      TEXT_MODEL: ${TEXT_MODEL:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-}
    env_file: *env-file
    volumes: &backend-volumes
      - huggingface-cache:/root/.cache/huggingface/hub
      - nltk-cache:/root/nltk_data
      - spacy-cache:/root/.cache/spacy
      - torch-cache:/root/.cache/torch
      - whisper-cache:/root/.cache/whisper
      - nextext-data:/var/lib/nextext
    networks: &backend-networks
      nextext-net:
        aliases:
          - backend
      inference-net:
        aliases:
          - nextext-backend
    profiles: ["cpu"]

  ##########################################################
  # Nextext backend (CUDA)
  ##########################################################
  backend-cuda:
    image: nextext-backend-cuda:${NEXTEXT_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.cuda
    logging: *default-logging
    environment:
      <<: *backend-env
      NVIDIA_VISIBLE_DEVICES: all
    env_file: *env-file
    volumes: *backend-volumes
    networks: *backend-networks
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    profiles: ["cuda"]

  ##########################################################
  # Nextext frontend (CPU) — Streamlit only, talks to backend
  ##########################################################
  frontend-cpu:
    image: nextext-frontend-cpu:${NEXTEXT_VERSION:-latest}
    build: &frontend-build
      context: ..
      dockerfile: docker/Dockerfile.frontend
    logging: *default-logging
    environment: &frontend-env
      <<: *no-proxy-env
      BACKEND_HOST: ${BACKEND_HOST:-http://backend:8000}
      BACKEND_PUBLIC_HOST: ${BACKEND_PUBLIC_HOST:-http://localhost:8000}
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: none
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: 8192
    env_file: *env-file
    networks: &frontend-networks
      nextext-net:
    depends_on:
      - backend-cpu
    profiles: ["cpu"]

  ##########################################################
  # Nextext frontend (CUDA) — same image, pointing at CUDA backend
  ##########################################################
  frontend-cuda:
    image: nextext-frontend-cuda:${NEXTEXT_VERSION:-latest}
    build: *frontend-build
    logging: *default-logging
    environment:
      <<: *frontend-env
    env_file: *env-file
    networks: *frontend-networks
    depends_on:
      - backend-cuda
    profiles: ["cuda"]

##########################################################
# Volumes — model caches live on the backend only.
##########################################################
volumes:
  huggingface-cache:
    external: true
  nltk-cache:
    external: true
  spacy-cache:
    external: true
  torch-cache:
    external: true
  whisper-cache:
    external: true
  nextext-data:
    external: true

##########################################################
# Networks
##########################################################
networks:
  nextext-net:
  inference-net:
    external: true
    name: ${INFERENCE_NETWORK:-inference-net}
