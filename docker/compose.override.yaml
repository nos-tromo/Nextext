### Dev override — publishes the Nextext frontend (React SPA) on the host.
###
### NOT auto-loaded: it lives in docker/ and the Makefile passes explicit -f
### flags. `make up-dev` layers this on top of docker/compose.yaml so the
### UI is reachable in dev; `make up` runs docker/compose.yaml alone
### (production shape).

services:
  frontend:
    ports:
      - "${NEXTEXT_HOST_PORT:-8501}:80"
