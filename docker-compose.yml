name: nextext

x-no-proxy-env: &no-proxy-env
  NO_PROXY: "backend,frontend,nextext,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"
  no_proxy: "backend,frontend,nextext,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"

x-env-file: &env-file
  - .env

services:
  ##########################################################
  # Nextext backend (CPU) — FastAPI + pipeline + CLI
  ##########################################################
  backend-cpu:
    image: nextext-backend-cpu:${NEXTEXT_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend.cpu
    environment: &backend-env
      <<: *no-proxy-env
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-false}
      HF_HUB_TOKEN: $HF_HUB_TOKEN
      INFERENCE_PROVIDER: ${INFERENCE_PROVIDER:-ollama}
      LOG_PATH: /var/log/nextext/backend-cpu.log
      NER_MODEL: ${NER_MODEL:-}
      NEXTEXT_API_HOST: ${NEXTEXT_API_HOST:-0.0.0.0}
      NEXTEXT_API_PORT: ${NEXTEXT_API_PORT:-8000}
      NEXTEXT_DATA_DIR: ${NEXTEXT_DATA_DIR:-/var/lib/nextext}
      NEXTEXT_JOB_TTL_SECONDS: ${NEXTEXT_JOB_TTL_SECONDS:-3600}
      NEXTEXT_MAX_UPLOAD_MB: ${NEXTEXT_MAX_UPLOAD_MB:-8192}
      NEXTEXT_OFFLINE: ${NEXTEXT_OFFLINE:-1}
      NEXTEXT_SESSION_COOKIE_SECURE: ${NEXTEXT_SESSION_COOKIE_SECURE:-false}
      NEXTEXT_SESSION_COOKIE_TTL_DAYS: ${NEXTEXT_SESSION_COOKIE_TTL_DAYS:-365}
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PRELOAD_MODELS: ${PRELOAD_MODELS:-false}
      TEXT_MODEL: ${TEXT_MODEL:-}
      TRANSLATION_MODEL: ${TRANSLATION_MODEL:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-}
    env_file: *env-file
    volumes: &backend-volumes
      - huggingface-cache:/root/.cache/huggingface/hub
      - nextext-data:/var/lib/nextext
      - nextext-logs:/var/log/nextext
      - nltk-cache:/root/nltk_data
      - spacy-cache:/root/.cache/spacy
      - torch-cache:/root/.cache/torch
      - whisper-cache:/root/.cache/whisper
    networks: &backend-networks
      inference-net:
        aliases:
          - backend
          - nextext-backend
          - nextext
    profiles: ["cpu"]

  ##########################################################
  # Nextext backend (CUDA)
  ##########################################################
  backend-cuda:
    image: nextext-backend-cuda:${NEXTEXT_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend.cuda
    environment:
      <<: *backend-env
      LOG_PATH: /var/log/nextext/backend-cuda.log
      NVIDIA_VISIBLE_DEVICES: all
    env_file: *env-file
    volumes: *backend-volumes
    networks: *backend-networks
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    profiles: ["cuda"]

  ##########################################################
  # Nextext frontend (CPU) — Streamlit only, talks to backend
  ##########################################################
  frontend-cpu:
    image: nextext-frontend-cpu:${NEXTEXT_VERSION:-latest}
    build: &frontend-build
      context: .
      dockerfile: Dockerfile.frontend
    ports: &frontend-ports
      - ${NEXTEXT_HOST_PORT:-8501}:8501
    environment: &frontend-env
      <<: *no-proxy-env
      BACKEND_HOST: ${BACKEND_HOST:-http://backend:8000}
      BACKEND_PUBLIC_HOST: ${BACKEND_PUBLIC_HOST:-http://localhost:8000}
      LOG_PATH: /var/log/nextext/frontend-cpu.log
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: none
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: 8192
    env_file: *env-file
    volumes: &frontend-volumes
      - nextext-logs:/var/log/nextext
    networks: &frontend-networks
      inference-net:
        aliases:
          - frontend
    depends_on:
      - backend-cpu
    profiles: ["cpu"]

  ##########################################################
  # Nextext frontend (CUDA) — same image, pointing at CUDA backend
  ##########################################################
  frontend-cuda:
    image: nextext-frontend-cuda:${NEXTEXT_VERSION:-latest}
    build: *frontend-build
    ports: *frontend-ports
    environment:
      <<: *frontend-env
      LOG_PATH: /var/log/nextext/frontend-cuda.log
    env_file: *env-file
    volumes: *frontend-volumes
    networks: *frontend-networks
    depends_on:
      - backend-cuda
    profiles: ["cuda"]

##########################################################
# Volumes — model caches live on the backend only.
##########################################################
volumes:
  huggingface-cache:
    external: true
  nextext-data:
    external: true
  nextext-logs:
  nltk-cache:
    external: true
  spacy-cache:
    external: true
  torch-cache:
    external: true
  whisper-cache:
    external: true

##########################################################
# Networks
##########################################################
networks:
  inference-net:
    external: true
    name: ${INFERENCE_NETWORK:-inference-net}
