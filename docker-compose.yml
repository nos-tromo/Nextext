name: nextext

x-no-proxy-env: &no-proxy-env
  NO_PROXY: "nextext,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"
  no_proxy: "nextext,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"

x-env-file: &env-file
  - .env

services:
  ##########################################################
  # Nextext (CPU)
  ##########################################################
  nextext-cpu:
    image: nextext-cpu:${NEXTEXT_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.cpu
    ports: &nextext-ports
      - ${NEXTEXT_HOST_PORT:-8501}:8501
    environment: &nextext-env
      <<: *no-proxy-env
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-false}
      HF_HUB_TOKEN: $HF_HUB_TOKEN
      INFERENCE_PROVIDER: ${INFERENCE_PROVIDER:-ollama}
      LOG_PATH: /var/log/nextext/nextext.log
      NER_MODEL: ${NER_MODEL:-}
      NEXTEXT_OFFLINE: ${NEXTEXT_OFFLINE:-1}
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PRELOAD_MODELS: ${PRELOAD_MODELS:-false}
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: false
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: none
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: 8192
      TEXT_MODEL: ${TEXT_MODEL:-}
      TRANSLATION_MODEL: ${TRANSLATION_MODEL:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-}
    env_file: *env-file
    volumes: &nextext-volumes
      - huggingface-cache:/root/.cache/huggingface/hub
      - nextext-logs:/var/log/nextext
      - nltk-cache:/root/nltk_data
      - spacy-cache:/root/.cache/spacy
      - torch-cache:/root/.cache/torch
      - whisper-cache:/root/.cache/whisper
    networks: &nextext-networks
      inference-net:
        aliases:
          - nextext-backend
    profiles: ["cpu"]

  ##########################################################
  # Nextext (CUDA)
  ##########################################################
  nextext-cuda:
    image: nextext-cuda:${NEXTEXT_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.cuda
    ports: *nextext-ports
    environment:
      <<: *nextext-env
      NVIDIA_VISIBLE_DEVICES: all
    env_file: *env-file
    volumes: *nextext-volumes
    networks: *nextext-networks
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    profiles: ["cuda"]

##########################################################
# Volumes
##########################################################
volumes:
  huggingface-cache:
    external: true
  nextext-logs:
  nltk-cache:
    external: true
  spacy-cache:
    external: true
  torch-cache:
    external: true
  whisper-cache:
    external: true

##########################################################
# Networks
##########################################################
networks:
  inference-net:
    external: true
    name: ${INFERENCE_NETWORK:-inference-net}
