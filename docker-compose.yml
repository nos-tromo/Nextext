#############################################################
# Docker Compose configuration for Nextext and Ollama services
# This configuration defines two main services: Nextext (for text processing)
# and Ollama (for language model hosting). Each service has both CPU and CUDA
# profiles to allow for flexible deployment based on available hardware.
#############################################################
x-proxy-env: &proxy-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  no_proxy: ${no_proxy:-}

x-base-image-build-env: &base-image-build-env
  PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12.10-slim-bookworm}
  NVIDIA_CUDA_RUNTIME_IMAGE: ${NVIDIA_CUDA_RUNTIME_IMAGE:-nvidia/cuda:13.0.2-cudnn-runtime-ubuntu22.04}
  VLLM_OPENAI_IMAGE: ${VLLM_OPENAI_IMAGE:-vllm/vllm-openai:v0.17.1}

x-build-args: &build-args
  <<: [*proxy-env, *base-image-build-env]

services:
  ##########################################################
  # Nextext (CPU)
  ##########################################################
  nextext:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: Dockerfile.cpu
      args:
        <<: *build-args
    ports: &nextext-ports
      - ${NEXTEXT_PORT:-8501:8501}
    environment: &backend-env
      <<: *proxy-env
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-false}
      HF_HUB_TOKEN: $HF_HUB_TOKEN
      LOG_PATH: /var/log/nextext/nextext.log
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PRELOAD_MODELS: ${PRELOAD_MODELS:-false}
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: false
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: none
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: 8192
      TEXT_MODEL: ${TEXT_MODEL:-}
      TRANSLATION_MODEL: ${TRANSLATION_MODEL:-}
    volumes: &backend-volumes
      - huggingface-cache:/root/.cache/huggingface/hub
      - nextext-logs:/var/log/nextext
      - nltk-cache:/root/nltk_data
      - spacy-cache:/root/.cache/spacy
      - torch-cache:/root/.cache/torch
    networks:
      nextext-net:
      inference-net:

  ##########################################################
  # Nextext (CUDA)
  ##########################################################
  nextext-cuda:
    profiles: ["cuda"]
    build:
      context: .
      dockerfile: Dockerfile.cuda
      args:
        <<: *build-args
    ports: *nextext-ports
    environment:
      <<: *backend-env
      NVIDIA_VISIBLE_DEVICES: all
    volumes: *backend-volumes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    networks:
      nextext-net:
      inference-net:

##########################################################
# Volumes
##########################################################
volumes:
  huggingface-cache:
    external: true
  nextext-logs:
  nltk-cache:
    external: true
  spacy-cache:
    external: true
  torch-cache:
    external: true

##########################################################
# Networks
##########################################################
networks:
  nextext-net:
  inference-net:
    external: true
    name: ${INFERENCE_NETWORK:-inference-net}
