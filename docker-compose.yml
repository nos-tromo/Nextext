#############################################################
# Docker Compose configuration for Nextext and Ollama services
# This configuration defines two main services: Nextext (for text processing)
# and Ollama (for language model hosting). Each service has both CPU and CUDA
# profiles to allow for flexible deployment based on available hardware.
#############################################################
x-proxy-env: &proxy-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  no_proxy: ${no_proxy:-}

x-base-image-build-env: &base-image-build-env
  PYTHON_SLIM_BOOKWORM_IMAGE: ${PYTHON_SLIM_BOOKWORM_IMAGE:-python:3.11-slim-bookworm}
  PYTHON_SLIM_IMAGE: ${PYTHON_SLIM_IMAGE:-python:3.11-slim}
  NVIDIA_CUDA_RUNTIME_IMAGE: ${NVIDIA_CUDA_RUNTIME_IMAGE:-nvidia/cuda:13.0.2-cudnn-runtime-ubuntu22.04}
  VLLM_OPENAI_IMAGE: ${VLLM_OPENAI_IMAGE:-vllm/vllm-openai:v0.17.1}

x-build-args: &build-args
  <<: [*proxy-env, *base-image-build-env]

services:
  ##########################################################
  # Nextext (CPU)
  ##########################################################
  nextext:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: Dockerfile.cpu
      args:
        <<: *build-args
    ports: &nextext-ports
      - "8501:8501"
    environment: &backend-env
      <<: *proxy-env
      HF_HUB_TOKEN: $HF_HUB_TOKEN
      INFERENCE_PROVIDER: ${INFERENCE_PROVIDER:-ollama}
      LOG_PATH: /var/log/nextext/nextext.log
      OPENAI_API_BASE: http://ollama-server:11434
      PRELOAD_MODELS: ${PRELOAD_MODELS:-false}
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: false
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: 8192
      USE_DEVICE: auto
    volumes: &backend-volumes
      - huggingface-cache:/root/.cache/huggingface/hub
      - nextext-logs:/var/log/nextext
      - nltk-cache:/root/nltk_data
      - spacy-cache:/root/.cache/spacy
      - torch-cache:/root/.cache/torch
    networks:
      nextext-net:

  ##########################################################
  # Nextext (CUDA)
  ##########################################################
  nextext-cuda:
    profiles: ["cuda"]
    build:
      context: .
      dockerfile: Dockerfile.cuda
      args:
        <<: *build-args
    ports: *nextext-ports
    environment:
      <<: *backend-env
      NVIDIA_VISIBLE_DEVICES: all
    volumes: *backend-volumes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    networks:
      nextext-net:

  ##########################################################
  # Ollama (CPU)
  ##########################################################
  ollama:
    profiles: ["cpu"]
    image: ollama/ollama:0.17.7
    ports: &ollama-ports
      - 11434:11434
    environment: &ollama-env
      <<: *proxy-env
      OLLAMA_HOST: 0.0.0.0
    volumes: &ollama-volumes
      - ollama-cache:/root/.ollama
    networks: &ollama-net
      nextext-net:
        aliases:
          - ollama-server

  ##########################################################
  # Ollama (CUDA)
  ##########################################################
  ollama-cuda:
    profiles: ["cuda"]
    image: ollama/ollama:0.17.7
    ports: *ollama-ports
    environment:
      <<: *ollama-env
      NVIDIA_VISIBLE_DEVICES: all
    volumes: *ollama-volumes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks: *ollama-net

##########################################################
# Volumes
##########################################################
volumes:
  huggingface-cache:
    external: true
  nextext-logs:
  nltk-cache:
    external: true
  ollama-cache:
    external: true
  spacy-cache:
    external: true
  torch-cache:
    external: true

##########################################################
# Networks
##########################################################
networks:
  nextext-net:
